        <link rel="stylesheet" type="text/css" href="style.css" media="screen"/>
        <style>
            /* Full-bleed bar colors behind scaled .stage (see yeti-chrome-sync in animation) */
            .bw-yeti-chrome {
                position: absolute;
                inset: 0;
                z-index: 5;
                pointer-events: none;
                overflow: hidden;
            }
            .bw-yeti-chrome > div {
                position: absolute;
                left: 0;
                width: 100%;
                box-sizing: border-box;
            }
            .bw-yeti-chrome-top {
                background: #fff;
            }
            .bw-yeti-chrome-score {
                background: #000;
            }
            .bw-yeti-chrome-bottom {
                /* Matches .bottomBar white + .bottomBar2 black strip (~33/168) */
                background: linear-gradient(
                    to bottom,
                    #fff 0%,
                    #fff calc(100% * 135 / 168),
                    #000 calc(100% * 135 / 168),
                    #000 100%
                );
            }
        </style>
