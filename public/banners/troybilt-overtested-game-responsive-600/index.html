<script type="text/javascript" src="three.min.js"></script>
<script type="text/javascript" src="GLTFLoader.min.js"></script>
<script type="text/javascript" src="WebGL.js"></script>
<script type="x-shader/x-vertex" id="vertexShader">
  varying vec3 vWorldPosition;
  void main() {
  	vec4 worldPosition = modelMatrix * vec4( position, 1.0 );
  	vWorldPosition = worldPosition.xyz;
  	gl_Position = projectionMatrix * modelViewMatrix * vec4( position, 1.0 );
  }
</script>
<script type="x-shader/x-fragment" id="fragmentShader">
  uniform vec3 topColor;
  uniform vec3 bottomColor;
  uniform float offset;
  uniform float exponent;
  varying vec3 vWorldPosition;
  void main() {
  	float h = normalize( vWorldPosition + offset ).y;
  	gl_FragColor = vec4( mix( bottomColor, topColor, max( pow( max( h , 0.0), exponent ), 0.0 ) ), 1.0 );
  }
</script>


<div class="game"></div>

<div class="header float">
  <img class="logo-lockup" src="logo-lockup@2x.png" />
</div>

<div class="introFrame float">

    </div>
  </div>
</div>

<div class="float transitionWipe">

</div>

<div class="float prompt2">

<div class="float arrows">

<div class="float testTitle">

  <circle id="clock_red" fill="#b31919" cx="29" cy="29" r="24" />

          </div>

      </div>
    </div>
    <div class="bot">

        <div class="cta cta-endframe-button">

          <div class="endScoreText endpoints">1532</div>

            <img class="cta-play-again-over float" src="ctaPlayAgain-over@2x.png" />

        </div>
      </div>
      <div
        class="endframe-portrait__headline endframe-overtest-300w"

        <!-- endframe-text3: 300×600 IAB sprite (png-element.png) -->

      </div>
      <div class="cta cta-endframe-button endframe-portrait__cta">

        <img class="ctaSeeHowWeTestOver float" src="ctaSeeHowWeTest-over@2x.png" />
      </div>
    </div>

</div>

<div class="footer" aria-hidden="true" style="position:absolute;width:0;height:0;overflow:hidden;clip:rect(0,0,0,0)">
